services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

  # Optional: Memgraph graph DB for dep graph persistence (MEMGRAPH_ENABLED=true)
  # Remove or comment out if not using Slither dep graph feature
  memgraph:
    image: memgraph/memgraph:latest
    container_name: mirofish_memgraph
    ports:
      - "7687:7687"   # Bolt protocol (Cypher queries via mgclient)
      - "7444:7444"   # Memgraph Lab web UI
    volumes:
      - memgraph_data:/var/lib/memgraph
    restart: unless-stopped

  # Foundry / forge — chạy theo yêu cầu, không start cùng `docker compose up`
  #
  # Dùng cho PoC verification (poc_verification.py Track 1/2) và debug thủ công.
  # Lý do dùng Docker: Ubuntu 20.04 có GLIBC 2.31, forge precompiled yêu cầu 2.32+.
  #
  # Volume mounts:
  #   FORGE_WORKSPACE  — thư mục SSD cho artifacts (out/, cache/, test/)
  #                      default: /mnt/ollama_data/mirofish_poc/dev
  #   FORGE_SRC        — thư mục source contract (read-only)
  #                      default: /tmp
  #
  # Ví dụ chạy thủ công:
  #   export FORGE_WORKSPACE=/mnt/ollama_data/mirofish_poc/35
  #   export FORGE_SRC=/home/thangdd/repos/web3bugs/contracts/35
  #   docker compose --profile forge run --rm forge build
  #   docker compose --profile forge run --rm forge test --match-contract _poc_mirofish --json
  #   docker compose --profile forge run --rm forge --version
  forge:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: mirofish_forge
    profiles: [forge]
    entrypoint: ["/usr/local/bin/forge"]
    working_dir: /workspace
    volumes:
      - ${FORGE_WORKSPACE:-/mnt/ollama_data/mirofish_poc/dev}:/workspace
      - ${FORGE_SRC:-/tmp}:/src:ro

volumes:
  memgraph_data: