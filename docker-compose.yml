services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

  # Optional: Memgraph graph DB for dep graph persistence (MEMGRAPH_ENABLED=true)
  # Remove or comment out if not using Slither dep graph feature
  memgraph:
    image: memgraph/memgraph:latest
    container_name: mirofish_memgraph
    ports:
      - "7687:7687"   # Bolt protocol (Cypher queries via mgclient)
      - "7444:7444"   # Memgraph Lab web UI
    volumes:
      - memgraph_data:/var/lib/memgraph
    restart: unless-stopped

volumes:
  memgraph_data: